# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m

android.useAndroidX=true
android.enableJetifier=true

reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# ❌ DISABLE New Architecture (REQUIRED)
newArchEnabled=false

# ✅ Hermes is fine
hermesEnabled=true

# ❌ DISABLE VisionCamera codegen (REQUIRED)
VisionCamera_enableFrameProcessors=false
VisionCamera_enableCodeScanner=false
MYAPP_UPLOAD_STORE_FILE=nuts-release-key.keystore
MYAPP_UPLOAD_KEY_ALIAS=nuts-key-alias
MYAPP_UPLOAD_STORE_PASSWORD=Hitarth
MYAPP_UPLOAD_KEY_PASSWORD=Hitarth
